<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tally Count — Count anything, easily</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="hero">
    <div class="hero-content">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="40" height="40">
            <line x1="10" y1="8"  x2="10" y2="32" />
            <line x1="16" y1="8"  x2="16" y2="32" />
            <line x1="22" y1="8"  x2="22" y2="32" />
            <line x1="28" y1="8"  x2="28" y2="32" />
            <line x1="7"  y1="24" x2="31" y2="12" />
          </svg>
        </div>
        <span class="wordmark">TALLY COUNT</span>
      </div>

      <p class="tagline">
        A beginner-friendly JavaScript project by Mariam
        <br>
        Built with HTML • CSS • JavaScript (DOM Manipulation)
      </p>
    </div>

    <div class="phone">
      <div class="phone-notch"></div>

      <div class="statusbar">
        <span>9:41</span>
        <span class="statusicons">▂▄▆ 🛜 🔋</span>
      </div>

      <div class="navbar">
        <div class="nav-brand">
          <div class="logo small" aria-hidden="true">
            <svg viewBox="0 0 40 40" width="18" height="18">
              <line x1="10" y1="8"  x2="10" y2="32" />
              <line x1="16" y1="8"  x2="16" y2="32" />
              <line x1="22" y1="8"  x2="22" y2="32" />
              <line x1="28" y1="8"  x2="28" y2="32" />
              <line x1="7"  y1="24" x2="31" y2="12" />
            </svg>
          </div>
          <span>TALLY COUNT</span>
        </div>
        <div class="nav-links">
          <span>Login</span>
          <span>Register</span>
        </div>
      </div>

      <div class="pager">
        <span class="pager-arrow">–</span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot active"></span>
        <span class="pager-arrow">+</span>
      </div>

      <div class="screen">
        <button class="gear" aria-label="Settings" title="Settings">⚙</button>
        <p class="counter-label">Deep Knee Bends</p>
        <p class="counter-value">0</p>
      </div>

      <div class="controls">
        <button class="btn minus" aria-label="Decrease count">–</button>
        <button class="btn plus" aria-label="Increase count">+</button>
      </div>
      <button class="btn reset" aria-label="Reset count">Reset</button>
      <p class="message"></p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
